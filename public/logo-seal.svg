<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <path id="top-arc" d="M 22,100 A 78,78 0 0,1 178,100"/>
    <path id="bottom-arc" d="M 38,132 A 73,73 0 0,0 162,132"/>
  </defs>

  <!-- Cercle extérieur -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#1E3FAB" stroke-width="3"/>
  <!-- Cercle intérieur -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="#1E3FAB" stroke-width="1.5"/>

  <!-- Texte haut : LABEL TECHNOLOGY -->
  <text font-family="'Arial',sans-serif" font-weight="800" font-size="13" fill="#1E3FAB" letter-spacing="2.5">
    <textPath href="#top-arc" startOffset="7%">LABEL TECHNOLOGY</textPath>
  </text>

  <!-- Texte bas : Études &amp; Constructions -->
  <text font-family="'Arial',sans-serif" font-weight="600" font-size="10.5" fill="#1E3FAB" letter-spacing="1.5">
    <textPath href="#bottom-arc" startOffset="10%">Études &amp; Constructions</textPath>
  </text>

  <!-- Étoiles -->
  <text x="18" y="105" font-size="10" fill="#1E3FAB" text-anchor="middle">★</text>
  <text x="182" y="105" font-size="10" fill="#1E3FAB" text-anchor="middle">★</text>

  <!-- Monogramme LT — L -->
  <rect x="55" y="60" width="9" height="40" rx="1" fill="#1E3FAB"/>
  <rect x="55" y="91" width="24" height="9" rx="1" fill="#1E3FAB"/>

  <!-- Monogramme LT — T barre horizontale -->
  <rect x="84" y="60" width="42" height="9" rx="1" fill="#1E3FAB"/>
  <!-- T — pads circuit aux extrémités -->
  <rect x="84" y="60" width="7" height="7" rx="1" fill="#2E55D4"/>
  <rect x="119" y="60" width="7" height="7" rx="1" fill="#2E55D4"/>
  <!-- T — tige verticale -->
  <rect x="100.5" y="60" width="9" height="40" rx="1" fill="#1E3FAB"/>
  <!-- T — pad circuit en bas -->
  <rect x="100.5" y="91" width="9" height="9" rx="1" fill="#2E55D4"/>

  <!-- Puce circuit sous le LT -->
  <rect x="83" y="107" width="34" height="18" rx="2" fill="none" stroke="#1E3FAB" stroke-width="1.8"/>
  <line x1="90" y1="107" x2="90" y2="103" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="97" y1="107" x2="97" y2="103" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="104" y1="107" x2="104" y2="103" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="111" y1="107" x2="111" y2="103" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="90" y1="125" x2="90" y2="129" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="97" y1="125" x2="97" y2="129" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="104" y1="125" x2="104" y2="129" stroke="#1E3FAB" stroke-width="1.5"/>
  <line x1="111" y1="125" x2="111" y2="129" stroke="#1E3FAB" stroke-width="1.5"/>
</svg>
